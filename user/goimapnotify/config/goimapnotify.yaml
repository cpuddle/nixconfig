configurations:
  - host: outlook.office365.com
    port: 993
    tls: true
    tlsOptions:
      rejectUnauthorized: true
    username: collin@collinfranklin.com
    xoauth2: true
    passwordCMD: "mutt_oauth2.py ~/.local/state/mutt_oauth2/collin.gpg --encryption-pipe 'gpg --encrypt --recipient collin@collinfranklin.com' --decryption-pipe 'gpg --decrypt'"
    boxes:
      - mailbox: INBOX
        onNewMail: "notify-send -a aerc 'New Mail' 'New message in INBOX'"
        onNewMailPost: ""
